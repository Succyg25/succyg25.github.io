<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#06b6d4" />  <!-- cyan-500 -->
            <stop offset="50%" stop-color="#6366f1" />  <!-- indigo-500 -->
            <stop offset="100%" stop-color="#a855f7" /> <!-- purple-500 -->
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>

    <!-- Base Glow -->
    <g filter="url(#glow)">
        <!-- Outer Isometric Hexagon (C-like bounds) -->
        <path d="M 256, 48 L 436, 152 L 436, 360 L 256, 464 L 76, 360 L 76, 152 Z" 
              fill="none" stroke="url(#logoGrad)" stroke-width="32" stroke-linejoin="round"/>
        
        <!-- Inner Isometric 'S' Shape -->
        <path d="M 346,204 L 256,152 L 166,204 L 346,308 L 256,360 L 166,308" 
              fill="none" stroke="url(#logoGrad)" stroke-width="40" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Sharp Overlay for Crispness -->
    <g>
        <path d="M 256, 48 L 436, 152 L 436, 360 L 256, 464 L 76, 360 L 76, 152 Z" 
              fill="none" stroke="#ffffff" stroke-width="4" stroke-linejoin="round" opacity="0.6"/>
        <path d="M 346,204 L 256,152 L 166,204 L 346,308 L 256,360 L 166,308" 
              fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    </g>
</svg>
